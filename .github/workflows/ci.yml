name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    name: Detect Changed Areas
    runs-on: ubuntu-latest
    outputs:
      www: ${{ steps.filter.outputs.www }}
      exam_api: ${{ steps.filter.outputs.exam_api }}
      panel_api: ${{ steps.filter.outputs.panel_api }}
      ops_api: ${{ steps.filter.outputs.ops_api }}
      force_all: ${{ steps.filter.outputs.force_all }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Path Filter
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            www:
              - 'apps/www/**'
              - 'src/**'
              - 'public/**'
              - 'index.html'
              - 'vite.config.ts'
              - 'vercel.www.json'
            exam_api:
              - 'apps/exam-api/**'
              - 'api/exam/**'
              - 'api/health.js'
              - 'db/**'
              - 'vercel.exam-api.json'
              - 'packages/shared/backend/**'
            panel_api:
              - 'apps/panel-api/**'
              - 'api/panel/**'
              - 'vercel.panel-api.json'
              - 'packages/shared/backend/**'
            ops_api:
              - 'apps/ops-api/**'
              - 'api/ops/**'
              - 'api/notifications/worker.js'
              - 'vercel.ops-api.json'
              - 'packages/shared/backend/**'
            force_all:
              - '.github/workflows/**'
              - 'config/**'
              - 'scripts/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'tsconfig.json'
              - 'eslint.config.mjs'
              - 'vercel.json'

      - name: Print Change Summary
        run: |
          echo "www=${{ steps.filter.outputs.www }}"
          echo "exam_api=${{ steps.filter.outputs.exam_api }}"
          echo "panel_api=${{ steps.filter.outputs.panel_api }}"
          echo "ops_api=${{ steps.filter.outputs.ops_api }}"
          echo "force_all=${{ steps.filter.outputs.force_all }}"

  quality:
    name: Lint, Typecheck, Test, Build
    runs-on: ubuntu-latest
    needs: [changes]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify shared backend sync
        run: pnpm check:shared-backend-sync

      - name: Verify legacy runtime mirror sync
        run: pnpm check:legacy-runtime-sync

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Runtime Boundaries Audit
        run: pnpm runtime-boundaries:audit

  preflight:
    name: P0 Preflight (Topology + Observability)
    runs-on: ubuntu-latest
    needs: [quality]
    env:
      WWW_BASE_URL: ${{ vars.WWW_BASE_URL || 'https://teachera.com.tr' }}
      EXAM_API_BASE_URL: ${{ vars.EXAM_API_BASE_URL || 'https://exam-api.teachera.com.tr' }}
      PANEL_API_BASE_URL: ${{ vars.PANEL_API_BASE_URL || 'https://panel-api.teachera.com.tr' }}
      OPS_API_BASE_URL: ${{ vars.OPS_API_BASE_URL || 'https://ops-api.teachera.com.tr' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      AURORA_CLUSTER_ID: ${{ vars.AURORA_CLUSTER_ID }}
      RDS_INSTANCE_ID: ${{ vars.RDS_INSTANCE_ID }}
      ELASTICACHE_REPLICATION_GROUP_ID: ${{ vars.ELASTICACHE_REPLICATION_GROUP_ID }}
      SQS_QUEUE_URL: ${{ vars.SQS_QUEUE_URL }}
      S3_BUCKET_NAME: ${{ vars.S3_BUCKET_NAME }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}
      OBSERVABILITY_DASHBOARD_NAME: ${{ vars.OBSERVABILITY_DASHBOARD_NAME }}
      OBSERVABILITY_ALARM_PREFIX: ${{ vars.OBSERVABILITY_ALARM_PREFIX }}
      OBSERVABILITY_ALARM_SNS_TOPIC_ARN: ${{ vars.OBSERVABILITY_ALARM_SNS_TOPIC_ARN }}
      OBSERVABILITY_COLLECTOR_SECRET: ${{ secrets.OBSERVABILITY_COLLECTOR_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NOTIFICATION_WORKER_SECRET: ${{ secrets.NOTIFICATION_WORKER_SECRET }}
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: P0-9 preflight (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          args=(--http --preflight-only)
          aws_ready=true

          required_topology=(
            AWS_REGION
            ELASTICACHE_REPLICATION_GROUP_ID
            SQS_QUEUE_URL
            S3_BUCKET_NAME
            CLOUDFRONT_DISTRIBUTION_ID
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
          )
          for key in "${required_topology[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              aws_ready=false
            fi
          done
          if [[ -z "${AURORA_CLUSTER_ID:-}" && -z "${RDS_INSTANCE_ID:-}" ]]; then
            aws_ready=false
          fi

          if [[ "${aws_ready}" == "true" ]]; then
            args+=(--aws)
            echo "INFO|p0_9_preflight|mode=http+aws"
          else
            echo "WARN|p0_9_preflight|aws_mode_skipped_missing_env_or_creds"
          fi

          node scripts/p0-9-topology-audit.mjs "${args[@]}"

      - name: P0-10 preflight (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          if [[ -z "${OBSERVABILITY_COLLECTOR_SECRET:-}" && -z "${CRON_SECRET:-}" && -z "${NOTIFICATION_WORKER_SECRET:-}" ]]; then
            echo "WARN|p0_10_preflight|skipped_missing_collector_secret"
            exit 0
          fi

          args=(--http --preflight-only)
          aws_ready=true

          required_observability=(
            AWS_REGION
            OBSERVABILITY_ALARM_SNS_TOPIC_ARN
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
          )
          for key in "${required_observability[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              aws_ready=false
            fi
          done

          if [[ "${aws_ready}" == "true" ]]; then
            args+=(--aws)
            echo "INFO|p0_10_preflight|mode=http+aws"
          else
            echo "WARN|p0_10_preflight|aws_mode_skipped_missing_env_or_creds"
          fi

          node scripts/p0-10-observability-audit.mjs "${args[@]}"

  evidence_gate:
    name: Evidence Gate (P0-10 + P0-11 + P0-12)
    runs-on: ubuntu-latest
    needs: [preflight]
    env:
      WWW_BASE_URL: ${{ vars.WWW_BASE_URL || 'https://teachera.com.tr' }}
      EXAM_API_BASE_URL: ${{ vars.EXAM_API_BASE_URL || 'https://exam-api.teachera.com.tr' }}
      PANEL_API_BASE_URL: ${{ vars.PANEL_API_BASE_URL || 'https://panel-api.teachera.com.tr' }}
      OPS_API_BASE_URL: ${{ vars.OPS_API_BASE_URL || 'https://ops-api.teachera.com.tr' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      AWS_DEFAULT_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      OBSERVABILITY_AWS_REGION: ${{ vars.AWS_REGION || 'eu-north-1' }}
      OBSERVABILITY_DASHBOARD_NAME: ${{ vars.OBSERVABILITY_DASHBOARD_NAME }}
      OBSERVABILITY_ALARM_PREFIX: ${{ vars.OBSERVABILITY_ALARM_PREFIX }}
      OBSERVABILITY_ALARM_SNS_TOPIC_ARN: ${{ vars.OBSERVABILITY_ALARM_SNS_TOPIC_ARN }}
      P0_11_REPORT_SIGNING_KEY: ${{ secrets.P0_11_REPORT_SIGNING_KEY }}
      OBSERVABILITY_COLLECTOR_SECRET: ${{ secrets.OBSERVABILITY_COLLECTOR_SECRET }}
      CRON_SECRET: ${{ secrets.CRON_SECRET }}
      NOTIFICATION_WORKER_SECRET: ${{ secrets.NOTIFICATION_WORKER_SECRET }}
      PANEL_EMAIL: ${{ secrets.PANEL_EMAIL }}
      PANEL_PASSWORD: ${{ secrets.PANEL_PASSWORD }}
      PANEL_SMOKE_TOTP_SECRET: ${{ secrets.PANEL_SMOKE_TOTP_SECRET }}
      REQUIRE_PANEL_FULL_AUTH: "true"
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      AWS_SESSION_TOKEN: ${{ secrets.AWS_SESSION_TOKEN }}
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Mandatory evidence gate (fail-fast)
        shell: bash
        run: |
          set -euo pipefail
          has_signing_key=false
          if [[ -n "${P0_11_REPORT_SIGNING_KEY:-}" || -n "${CRON_SECRET:-}" ]]; then
            has_signing_key=true
          fi

          has_observability_secret=false
          if [[ -n "${OBSERVABILITY_COLLECTOR_SECRET:-}" || -n "${CRON_SECRET:-}" || -n "${NOTIFICATION_WORKER_SECRET:-}" ]]; then
            has_observability_secret=true
          fi

          if [[ "${has_signing_key}" != "true" || "${has_observability_secret}" != "true" ]]; then
            echo "WARN|evidence_gate|soft_mode_missing_sensitive_secrets|signing_key=${has_signing_key}|obs_secret=${has_observability_secret}"
            pnpm run ci:path-filter:selftest
            pnpm run p0:go-live:package:audit -- --http
            pnpm run panel:step14:closeout
            pnpm run panel:step16:ops-grid
            pnpm run panel:step17:rbac-session
            pnpm run panel:step18:rbac-policy
            pnpm run panel:step19:data-contract
            pnpm run panel:step20:final-closeout
            pnpm run frontend:uat:rc
            exit 0
          fi

          args=(p0:evidence:gate)

          aws_ready=true
          required_aws_gate=(
            AWS_REGION
            AWS_ACCESS_KEY_ID
            AWS_SECRET_ACCESS_KEY
            OBSERVABILITY_ALARM_SNS_TOPIC_ARN
          )
          for key in "${required_aws_gate[@]}"; do
            if [[ -z "${!key:-}" ]]; then
              aws_ready=false
            fi
          done

          if [[ "${aws_ready}" == "true" ]]; then
            echo "INFO|evidence_gate|mode=http+aws"
            args+=(-- --aws)
          else
            echo "WARN|evidence_gate|aws_mode_skipped_missing_env_or_creds"
          fi

          pnpm "${args[@]}"

  deploy_www:
    name: Deploy www (path-based)
    runs-on: ubuntu-latest
    needs: [changes, quality, preflight, evidence_gate]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.www == 'true' || needs.changes.outputs.force_all == 'true')
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm deploy:www:prod

  deploy_exam_api:
    name: Deploy exam-api (path-based)
    runs-on: ubuntu-latest
    needs: [changes, quality, preflight, evidence_gate]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.exam_api == 'true' || needs.changes.outputs.force_all == 'true')
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm deploy:exam-api:prod

  deploy_panel_api:
    name: Deploy panel-api (path-based)
    runs-on: ubuntu-latest
    needs: [changes, quality, preflight, evidence_gate]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.panel_api == 'true' || needs.changes.outputs.force_all == 'true')
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm deploy:panel-api:prod

  deploy_ops_api:
    name: Deploy ops-api (path-based)
    runs-on: ubuntu-latest
    needs: [changes, quality, preflight, evidence_gate]
    if: >
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (needs.changes.outputs.ops_api == 'true' || needs.changes.outputs.force_all == 'true')
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
          run_install: false
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm deploy:ops-api:prod
